<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Management Suite - Test Application</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Business Management Suite</h1>
      <p class="subtitle">Test Application</p>
    </header>

    <main>
      <!-- Health Status Section -->
      <section class="card">
        <h2>System Health</h2>
        <div class="status-row">
          <span class="label">Status:</span>
          <span id="health-status" class="value">Loading...</span>
        </div>
        <div class="status-row">
          <span class="label">Last Check:</span>
          <span id="health-timestamp" class="value">-</span>
        </div>
      </section>

      <!-- Ping Test Section -->
      <section class="card">
        <h2>Ping Test</h2>
        <button id="ping-button" class="btn-primary">Send Test Ping</button>
        
        <div class="ping-stats">
          <div class="stat-item">
            <div class="stat-label">Total Pings</div>
            <div id="ping-count" class="stat-value">0</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">Last Ping ID</div>
            <div id="last-ping-id" class="stat-value">-</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">Last Ping Time</div>
            <div id="last-ping-time" class="stat-value">-</div>
          </div>
        </div>
      </section>

      <!-- Status Messages -->
      <div id="status-message" class="status-message hidden" role="status" aria-live="polite"></div>
    </main>

    <footer>
      <p>Business Management Suite v0.1.0</p>
      <p class="info-text">Future modules: CRM, Contracts, Bookkeeping, Marketing Analytics</p>
    </footer>
  </div>

  <script src="main.js"></script>
</body>
</html>
